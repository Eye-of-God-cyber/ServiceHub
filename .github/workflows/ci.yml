name: ServiceHub CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Setup a PostgreSQL service container for isolated integration testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: servicehub_user
          POSTGRES_PASSWORD: servicehub_password
          POSTGRES_DB: servicehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      # Use the service container DB and enforce test_schema to pass safety checks
      DATABASE_URL: postgresql://servicehub_user:servicehub_password@localhost:5432/servicehub?schema=test_schema
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      PORT: 3000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Database Migrations
        run: npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: Run Integration Tests
        run: npm run test

      - name: Build Docker Image
        run: docker build -t servicehub-api:ci .
